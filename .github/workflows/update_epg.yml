name: Update Filtered EPG

on:
  schedule:
    - cron: '0 */6 * * *' # S'exécute toutes les 6 heures
  workflow_dispatch: # Bouton manuel pour tester

jobs:
  update-epg:
    runs-on: ubuntu-latest
    # On donne explicitement les permissions d'écriture pour le token GITHUB_TOKEN
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Récupère tout l'historique pour éviter les conflits de rebase

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run EPG Extraction
        run: python extract_epg.py

      - name: Commit and Push changes
        run: |
          git config --global user.name 'EPG-Bot'
          git config --global user.email 'bot@noreply.github.com'
          
          # On ajoute le fichier généré
          git add filtered_epg.json
          
          # Vérification s'il y a des changements réels
          if git diff --staged --quiet; then
            echo "Aucun changement détecté dans le fichier EPG."
            exit 0
          fi

          # Stratégie anti-conflit : on pull les changements distants avec rebase
          # Si quelqu'un a modifié le repo entre-temps, le commit du bot se met "par-dessus"
          git commit -m "Update EPG data [skip ci]"
          git pull --rebase origin main
          git push origin main
          
