name: Update Filtered EPG

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run EPG Extraction
        run: python extract_epg.py

      - name: Atomic Sync and Push
        run: |
          git config --global user.name 'EPG-Bot'
          git config --global user.email 'bot@noreply.github.com'
          
          # 1. On récupère l'état du serveur
          git fetch origin main
          
          # 2. On "staged" notre nouveau fichier
          git add schedule.json
          
          # 3. S'il y a des changements, on commit
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update EPG data [skip ci]"
            
            # 4. LA CLÉ : On pull avec rebase. 
            # S'il y a un conflit sur le JSON, on dit à Git de prendre NOTRE version (-X theirs)
            git pull --rebase -X theirs origin main
            
            # 5. On pousse normalement
            git push origin main
          else
            echo "Rien à mettre à jour."
          fi
          
